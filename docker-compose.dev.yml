name: ai-marketing-platform-dev

# All values are sourced from the root .env file (see .env.example).
# Note: infra/dev/supabase/kong.yml hardcodes the anon/service keys —
# Kong's declarative config does not support env var substitution.

services:

  # ── Supabase: Database ────────────────────────────────────────────────────

  db:
    image: supabase/postgres:15.8.1.060
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: 5432
      POSTGRES_PORT: 5432
      PGPASSWORD: ${DB_PASSWORD}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATABASE: postgres
      POSTGRES_DB: postgres
      JWT_SECRET: ${SUPABASE_JWT_SECRET}
      JWT_EXP: 3600
    volumes:
      - supabase_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Supabase: Auth (GoTrue) ───────────────────────────────────────────────

  auth:
    image: supabase/gotrue:v2.170.0
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${PUBLIC_SUPABASE_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgresql://supabase_auth_admin:${DB_PASSWORD}@db:5432/postgres
      GOTRUE_SITE_URL: ${SPA_URL}
      GOTRUE_URI_ALLOW_LIST: ""
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_ADMIN_EMAIL: admin@localhost
      GOTRUE_SMTP_HOST: inbucket
      GOTRUE_SMTP_PORT: 2500
      GOTRUE_SMTP_USER: fake
      GOTRUE_SMTP_PASS: fake
      GOTRUE_SMTP_SENDER_NAME: vozai-dev
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Supabase: REST (PostgREST) ────────────────────────────────────────────

  rest:
    image: postgrest/postgrest:v12.2.8
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgresql://authenticator:${DB_PASSWORD}@db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: 3600
    command: postgrest

  # ── Supabase: Storage ─────────────────────────────────────────────────────

  storage:
    image: supabase/storage-api:v1.58.4
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started
    environment:
      ANON_KEY: ${PUBLIC_SUPABASE_PUBLISHABLE_KEY}
      SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      DATABASE_URL: postgresql://supabase_storage_admin:${DB_PASSWORD}@db:5432/postgres
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:5001
    volumes:
      - supabase_storage_data:/var/lib/storage

  # ── Supabase: Image proxy (for storage transforms) ────────────────────────

  imgproxy:
    image: darthsim/imgproxy:v3.8.0
    environment:
      IMGPROXY_BIND: 0.0.0.0:5001
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
    volumes:
      - supabase_storage_data:/var/lib/storage:ro

  # ── Supabase: Postgres meta ───────────────────────────────────────────────

  meta:
    image: supabase/postgres-meta:v0.85.0
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_URL: postgresql://supabase_admin:${DB_PASSWORD}@db:5432/postgres

  # ── Supabase: Kong API gateway ────────────────────────────────────────────

  kong:
    image: kong:2.8.5
    depends_on:
      db:
        condition: service_healthy
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
    volumes:
      - ./infra/dev/supabase/kong.yml:/var/lib/kong/kong.yml:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Supabase: Email catcher (dev only) ────────────────────────────────────

  inbucket:
    image: inbucket/inbucket:3.0.4
    ports:
      - "9000:9000"   # web UI: http://localhost:9000

  # ── Supabase: Studio ──────────────────────────────────────────────────────

  studio:
    image: supabase/studio:latest
    depends_on:
      kong:
        condition: service_healthy
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: vozai-local
      DEFAULT_PROJECT_NAME: vozai-dev
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${PUBLIC_SUPABASE_URL}
      SUPABASE_ANON_KEY: ${PUBLIC_SUPABASE_PUBLISHABLE_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${SUPABASE_JWT_SECRET}
    ports:
      - "3001:3000"

  # ── Backend services ──────────────────────────────────────────────────────

  webapp-api:
    build:
      context: ./backend
      dockerfile: webapp-api/Dockerfile
    command: [
      "/backend/.venv/bin/uvicorn", "src.main:app",
      "--host", "0.0.0.0", "--port", "8080",
      "--reload", "--reload-dir", "/backend/webapp-api/src", "--reload-dir", "/backend/webapp-api/lib"
    ]
    env_file:
      - path: ./.env
        required: false
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/postgres
      DIRECT_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/postgres
      PUBLIC_SUPABASE_URL: http://kong:8000
      PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${PUBLIC_SUPABASE_PUBLISHABLE_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SCRAPER_SERVICE_URL: http://scraper-api:8081
      API_BASE_URL: http://webapp-api:8080
      SCRAPER_CALLBACK_SECRET: ${WEBAPP_API_SCRAPER_CALLBACK_SECRET}
      GEMINI_API_KEY: ${WEBAPP_API_GEMINI_API_KEY}
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
      OTEL_EXPORTER_OTLP_ENDPOINT: http://vector:4317
      OTEL_SERVICE_NAME: webapp-api
      LOGFIRE_SEND_TO_LOGFIRE: "false"
      LOGFIRE_OTLP_ENDPOINT: http://vector:4318
    volumes:
      - ./backend/webapp-api/src:/backend/webapp-api/src
      - ./backend/webapp-api/lib:/backend/webapp-api/lib
      - ./backend/webapp-api-contract:/backend/webapp-api-contract
      - ./backend/scraper-api-contract:/backend/scraper-api-contract
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      kong:
        condition: service_healthy
      vector:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  scraper-api:
    build:
      context: ./backend
      dockerfile: scraper-api/Dockerfile
    command: [
      "/backend/.venv/bin/uvicorn", "src.main:app",
      "--host", "0.0.0.0", "--port", "8081",
      "--reload", "--reload-dir", "/backend/scraper-api/src"
    ]
    env_file:
      - path: ./.env
        required: false
    environment:
      PORT: "8081"
      SUPABASE_URL: http://kong:8000
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
      OTEL_EXPORTER_OTLP_ENDPOINT: http://vector:4317
      OTEL_SERVICE_NAME: scraper-api
      LOGFIRE_SEND_TO_LOGFIRE: "false"
      LOGFIRE_OTLP_ENDPOINT: http://vector:4318
    volumes:
      - ./backend/scraper-api/src:/backend/scraper-api/src
      - ./backend/scraper-api-contract:/backend/scraper-api-contract
      - ./backend/webapp-api-contract:/backend/webapp-api-contract
    ports:
      - "8081:8081"
    depends_on:
      vector:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── Observability stack ───────────────────────────────────────────────────

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8088:8080"

  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"

  vector:
    image: timberio/vector:latest-alpine
    command: ["--config", "/etc/vector/config.yaml"]
    volumes:
      - ./infra/dev/vector/config.yaml:/etc/vector/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "9598:9598"   # Prometheus scrape endpoint

  loki:
    image: grafana/loki:3.4.3
    user: "0"
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./infra/dev/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/var/loki
    ports:
      - "3100:3100"

  prometheus:
    image: prom/prometheus:v3.3.1
    command:
      - "--config.file=/etc/prometheus/config.yaml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./infra/dev/prometheus/config.yaml:/etc/prometheus/config.yaml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.6.1
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./infra/dev/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki

volumes:
  supabase_db_data:
  supabase_storage_data:
  loki_data:
  prometheus_data:
  grafana_data:
