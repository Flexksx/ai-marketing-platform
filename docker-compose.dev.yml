name: ai-marketing-platform-dev

services:
  frontend:
    build:
      context: ./apps/webapp/spa
      dockerfile: ../Dockerfile
      target: dev
    working_dir: /workspace
    volumes:
      - ./apps/webapp/spa:/workspace
      - webapp-spa-node-modules:/workspace/node_modules
    ports:
      - "5173:5173"

volumes:
  webapp-spa-node-modules:
