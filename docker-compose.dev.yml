name: ai-marketing-platform-dev

services:

  # ── Database ─────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: vozai
      POSTGRES_PASSWORD: vozai_dev_password
      POSTGRES_DB: vozai_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vozai -d vozai_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend services ──────────────────────────────────────────────────────────

  webapp-api:
    build:
      context: ./backend
      dockerfile: webapp-api/Dockerfile
    command: [
      "/app/.venv/bin/uvicorn", "src.main:app",
      "--host", "0.0.0.0", "--port", "8080",
      "--reload", "--reload-dir", "/app/src", "--reload-dir", "/app/lib"
    ]
    env_file:
      - path: ./backend/webapp-api/.env
        required: false
    environment:
      DATABASE_URL: postgresql://vozai:vozai_dev_password@postgres:5432/vozai_dev
      DIRECT_URL: postgresql://vozai:vozai_dev_password@postgres:5432/vozai_dev
      SCRAPER_SERVICE_URL: http://scraper-api:8081
      API_BASE_URL: http://webapp-api:8080
      SCRAPER_CALLBACK_SECRET: dev-secret
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: webapp-api
      LOGFIRE_SEND_TO_LOGFIRE: "false"
      LOGFIRE_OTLP_ENDPOINT: http://otel-collector:4318
    volumes:
      - ./backend/webapp-api/src:/app/src
      - ./backend/webapp-api/lib:/app/lib
      - ./backend/webapp-api-contract:/webapp-api-contract
      - ./backend/scraper-api-contract:/scraper-api-contract
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  scraper-api:
    build:
      context: ./backend
      dockerfile: scraper-api/Dockerfile
    command: [
      "/app/.venv/bin/uvicorn", "src.main:app",
      "--host", "0.0.0.0", "--port", "8081",
      "--reload", "--reload-dir", "/app/src"
    ]
    env_file:
      - path: ./backend/scraper-api/.env
        required: false
    environment:
      PORT: "8081"
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: scraper-api
      LOGFIRE_SEND_TO_LOGFIRE: "false"
      LOGFIRE_OTLP_ENDPOINT: http://otel-collector:4318
    volumes:
      - ./backend/scraper-api/src:/app/src
      - ./backend/scraper-api-contract:/scraper-api-contract
      - ./backend/webapp-api-contract:/webapp-api-contract
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── Frontend ──────────────────────────────────────────────────────────────────

  spa:
    build:
      context: .
      dockerfile: apps/webapp/Dockerfile
      target: dev
    command: >
      sh -c "pnpm install && pnpm --filter spa run dev --host 0.0.0.0"
    volumes:
      - .:/workspace
      - workspace_node_modules:/workspace/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true

  # ── Observability stack ───────────────────────────────────────────────────────

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8088:8080"

  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.127.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./infra/dev/otel-collector/config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics exporter

  tempo:
    image: grafana/tempo:2.7.2
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./infra/dev/tempo/config.yaml:/etc/tempo/config.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP API / query frontend
    depends_on:
      - otel-collector

  loki:
    image: grafana/loki:3.4.3
    user: "0"
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./infra/dev/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/var/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.4.3
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ./infra/dev/promtail/config.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:v3.3.1
    command:
      - "--config.file=/etc/prometheus/config.yaml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./infra/dev/prometheus/config.yaml:/etc/prometheus/config.yaml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.6.1
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor traceToMetrics
    volumes:
      - ./infra/dev/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
      - loki

volumes:
  workspace_node_modules:
  postgres_data:
  tempo_data:
  loki_data:
  prometheus_data:
  grafana_data:
