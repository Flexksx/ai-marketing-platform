name: ai-marketing-platform-dev

services:
  frontend:
    build:
      context: ./apps/webapp
      dockerfile: Dockerfile
      target: dev
    working_dir: /workspace
    volumes:
      - ./apps/webapp:/workspace
      - webapp-node-modules:/workspace/node_modules
    ports:
      - "5173:5173"

volumes:
  webapp-node-modules:
