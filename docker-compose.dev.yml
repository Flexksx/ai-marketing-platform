name: ai-marketing-platform-dev

services:
  spa:
    build:
      context: .
      dockerfile: apps/webapp/Dockerfile
      target: dev
    command: >
      sh -c "pnpm install && pnpm --filter spa run dev --host 0.0.0.0"
    volumes:
      - .:/workspace
      - workspace_node_modules:/workspace/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  workspace_node_modules:
