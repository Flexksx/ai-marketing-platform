name: ai-marketing-platform-dev

services:
  backend:
    build:
      context: ./backend/platform-api
      dockerfile: Dockerfile
      target: dev
    working_dir: /workspace
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mydatabase
      SPRING_DATASOURCE_USERNAME: myuser
      SPRING_DATASOURCE_PASSWORD: secret
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      JWT_SECRET: dev-secret-change-me
    volumes:
      - ./backend/platform-api:/workspace
      - gradle-cache:/root/.gradle
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  openapi-client-generator:
    image: node:24-alpine
    working_dir: /workspace
    environment:
      PLATFORM_API_OPENAPI_URL: http://backend:8080/v3/api-docs
    volumes:
      - ./:/workspace
      - openapi-generator-node-modules:/workspace/node_modules
    command: >
      sh -c "corepack enable &&
             pnpm install --frozen-lockfile &&
             ./bin/watch-openapi-client.sh"
    depends_on:
      backend:
        condition: service_started

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydatabase"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  gradle-cache:
  postgres-data:
  openapi-generator-node-modules:
