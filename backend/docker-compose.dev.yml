name: ai-marketing-platform-dev

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydatabase"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend/platform-api
      dockerfile: Dockerfile
      target: dev
    working_dir: /workspace
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mydatabase
      SPRING_DATASOURCE_USERNAME: myuser
      SPRING_DATASOURCE_PASSWORD: secret
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      SPRING_PROFILES_ACTIVE: dev
      JWT_SECRET: "+jc8Pw4vctmwg4un0s2veFhofwi6btp8kx0WK8KwDaI="
    volumes:
      - ./backend/platform-api:/workspace
      - gradle-cache:/root/.gradle
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

  openapi-init:
    image: node:24-alpine
    working_dir: /workspace
    environment:
      PLATFORM_API_OPENAPI_URL: http://backend:8080/v3/api-docs
    volumes:
      - ./:/workspace
      - openapi-node-modules:/workspace/node_modules
    command: >
      sh -c "apk add --no-cache bash curl &&
             corepack enable &&
             pnpm install --frozen-lockfile &&
             ./bin/regenerate-openapi-client.sh"
    depends_on:
      backend:
        condition: service_healthy

  openapi-watcher:
    image: node:24-alpine
    working_dir: /workspace
    environment:
      PLATFORM_API_OPENAPI_URL: http://backend:8080/v3/api-docs
    volumes:
      - ./:/workspace
      - openapi-node-modules:/workspace/node_modules
    command: >
      sh -c "apk add --no-cache bash curl &&
             ./bin/watch-openapi-client.sh"
    depends_on:
      openapi-init:
        condition: service_completed_successfully

  spa:
    build:
      context: .
      dockerfile: apps/webapp/Dockerfile
      target: dev
    environment:
      VITE_DEV_API_PROXY_TARGET: http://backend:8080
    volumes:
      - ./apps/webapp/spa:/workspace/apps/webapp/spa
      - ./lib/platform-api-client/src:/workspace/lib/platform-api-client/src
    ports:
      - "5173:5173"
    depends_on:
      openapi-init:
        condition: service_completed_successfully

volumes:
  gradle-cache:
  postgres-data:
  openapi-node-modules:
