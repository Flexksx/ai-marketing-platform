jwt:
  # Env overrides for Docker / prod. Default is 32+ bytes; HS256 is applied in JwtService.
  # Generate: openssl rand -base64 32
  secret: ${JWT_SECRET:dGVzdC1kZWYtaHMtMjU2LWtleS0zMmJ5dGUtYmFzZTY0LXBhZGRlZA==}
  expiration-ms: 86400000 # 24 hours

spring:
  application:
    name: platform-api-service
  docker:
    compose:
      enabled: ${SPRING_DOCKER_COMPOSE_ENABLED:false}
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/mydatabase
    username: myuser
    password: secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
