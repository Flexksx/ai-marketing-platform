steps:
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull ${_REGION}-docker.pkg.dev/${PROJECT_ID}/aimarketing/aimarketing-client-api:latest || true
        docker build \
          -f backend/Dockerfile \
          --target api \
          --cache-from ${_REGION}-docker.pkg.dev/${PROJECT_ID}/aimarketing/aimarketing-client-api:latest \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/aimarketing/aimarketing-client-api:${_IMAGE_TAG} \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/aimarketing/aimarketing-client-api:latest \
          .

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/aimarketing/aimarketing-client-api:${_IMAGE_TAG}'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/aimarketing/aimarketing-client-api:latest'

substitutions:
  _REGION: 'europe-central2'
  _IMAGE_TAG: 'latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: LEGACY

timeout: '1200s'

